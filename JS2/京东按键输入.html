<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" placeholder="搜索">
</body>
<script>
    var inputs = document.querySelector('input');
    document.addEventListener('keyup', function (e) {
        if (e.keyCode == 83) {
            inputs.focus();
        }
    });
</script>

</html>
