<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单全选</title>
</head>
<style>
    .wrap {
        width: 400px;
        margin: 120px auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead input {
        display: inline-block;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
    }

    thead {
        background-color: #305bdb;
    }

    tbody tr:hover {
        background-color: #dddddd;
    }

    #j_cbAll {
        margin-right: 10px;
    }
</style>

<body>
    <div class="wrap">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="j_cbAll"></th>
                    <th>商品</th>
                    <th>价钱</th>
                </tr>
            </thead>
            <tbody id="j_tb">
                <tr>
                    <td>
                        <input type="checkbox" name="" id="">
                    </td>
                    <td>iphone</td>
                    <td>8000</td>
                </tr>
                <tr>
                    <td>
                        <input type="checkbox" name="" id="">
                    </td>
                    <td>iphone</td>
                    <td>8000</td>
                </tr>
                <tr>
                    <td>
                        <input type="checkbox" name="" id="">
                    </td>
                    <td>ipad</td>
                    <td>8000</td>
                </tr>
                <tr>
                    <td>
                        <input type="checkbox" name="" id="">
                    </td>
                    <td>apple watch</td>
                    <td>3000</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
<script>
    var click_total = document.getElementById('j_cbAll');
    var click_one = document.getElementById('j_tb').querySelectorAll('input');
    click_total.onclick = function () {
        for (var i = 0; i < click_one.length; i++) {
            click_one[i].checked = this.checked;
        }
    }
    for (var i = 0; i < click_one.length; i++) {
        click_one[i].onclick = function () {
            // flag控制全选按钮是否全选
            var flag = true;
            // 每次点击下面的复选框都要循环检查4个小按钮是否被选中
            for (var i = 0; i < click_one.length; i++) {
                if (!click_one[i].checked) {
                    flag = false;
                }
            }
            click_total.checked = flag;
        }
    }
</script>

</html>
