<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../content/common.css">
    <title>大数据热点图</title>
    <style>
        @keyframes pulse {
            0% {}

            70% {
                width: 40px;
                height: 40px;
                /* 透明度 */
                opacity: 1;
            }

            100% {
                width: 70px;
                height: 70px;
                opacity: 0;
            }
        }

        body {
            background-color: #000;
        }

        .map {
            position: relative;
            margin: 50px auto;
            width: 747px;
            height: 616px;
            background: url("../images/map.png") no-repeat;
        }

        .beijing {
            position: absolute;
            top: 227px;
            right: 192px;
            color: #fff;
        }

        .dotted {
            width: 8px;
            height: 8px;
            background-color: #09f;
            border-radius: 50%;
        }

        .beijing div[class^="pulse"] {
            /* 保证我们小波纹在父盒子里面垂直居中，放大之后就会中心向四周发散 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            box-shadow: 0 0 12px #009dfd;
            border-radius: 50%;
            animation: pulse 1.2s linear infinite;
        }

        .beijing .dotted .pulse2 {
            animation-delay: 0.4s;
        }

        .beijing .dotted .pulse3 {
            animation-delay: 0.8s;
        }
    </style>
</head>

<body>
    <div class="map">
        <div class="beijing">
            <div class="dotted">
                <div class="pulse1"></div>
                <div class="pulse2"></div>
                <div class="pulse3"></div>
            </div>
        </div>
        <div class="guangzhou">
            <div class="dotted">
                <div class="pulse1"></div>
                <div class="pulse2"></div>
                <div class="pulse3"></div>
            </div>
        </div>
    </div>
    <button id="returnContent"><a href="../content/project.html">返回目录页</a></button>
</body>

</html>
