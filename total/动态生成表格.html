<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../content/common.css">
    <style>
        table {
            width: 500px;
            margin: 100px auto;
            border-collapse: collapse;
            text-align: center;
        }

        td,
        th {
            border: 1px solid #333;
        }

        thead tr {
            height: 40px;
            background-color: #ccc;
        }
    </style>
</head>

<body>
    <table cellspacing="0">
        <thead>
            <tr>
                <th>姓名</th>
                <th>科目</th>
                <th>成绩</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>
    <button id="returnContent"><a href="../content/project.html">返回首页</a></button>
</body>
<script>
    var datas = [
        {
            name: '卫英络',
            subject: 'javascript',
            scored: 100,
        },
        {
            name: '卫英络',
            subject: 'javascript',
            scored: 80,
        },
        {
            name: '卫英络',
            subject: 'javascript',
            scored: 99,
        },
        {
            name: '卫英络',
            subject: 'javascript',
            scored: 89,
        }
    ]
    // 2.往tbody里面创建行：通过数组的长度来创建行数
    var tbody = document.querySelector('tbody');
    for (var i = 0; i < datas.length; i++) {
        var tr = document.createElement('tr');
        tbody.appendChild(tr);
        // 行里面添加单元格td单元格的数量取决于每个对象里面的属性个数            for循环遍历对象 datase[i]
        for (var k in datas[i]) {
            var td = document.createElement('td');
            td.innerHTML = datas[i][k];
            tr.appendChild(td);
        }
        var td = document.createElement('td');
        td.innerHTML = "<a href='javascript:;'>删除</a>";
        tr.appendChild(td);

    }
    var as = document.querySelectorAll('a');
    for (var i = 0; i < as.length; i++) {
        as[i].onclick = function () {
            tbody.removeChild(this.parentNode.parentNode);
        }
    }
</script>

</html>
