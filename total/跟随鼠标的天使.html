<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../content/common.css">
</head>
<style>
    img {
        position: absolute;
        width: 50px;
        height: 50px;
    }
</style>

<body>
    <img src="../images/pkq.jpg" alt="">
    <button id="returnContent"><a href="../content/project.html">返回首页</a></button>
</body>
<script>
    var p = document.querySelector('img');
    document.addEventListener('mousemove', function (e) {
        var x = e.pageX;
        var y = e.pageY;
        // 不要忘记添加一个px
        p.style.left = x - 26 + 'px';
        p.style.top = y - 25 + 'px';
    });
</script>

</html>
