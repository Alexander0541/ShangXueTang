<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初学者课堂登录页面</title>
    <style>
        /* 设置底色，内容居中 */
        * {
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0e92b3;
        }

        a {
            text-decoration: none;
            color: #fff;
        }

        /* 登入容器：底色/阴影/圆角 */
        .form {
            width: 300px;
            background-color: rgb(41, 45, 62);
            color: #fff;
            border-radius: 2px;
            padding: 50px 80px 80px;
            border-radius: 10px;
            box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.4);
        }

        /* 头部标签的基本样式 */
        .header {
            text-align: center;
            font-size: 35px;
            text-transform: uppercase;
            line-height: 100px;
        }

        /* 输入框的基本样式 */
        .main .inpbox input {
            background-color: rgb(41, 45, 62);
            border: 0;
            width: 100%;
            text-align: center;
            font-size: 15px;
            color: #fff;
            outline: none;
        }

        /* 设计外层容器渐变背景 */
        .main .inpbox {
            background: linear-gradient(90deg, #03a9f4, #f441a5, #ffeb3b, #03a9f4);
            background-size: 400%;
            width: 100%;
            height: 50px;
            margin-bottom: 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1s;
        }

        /* 扩展输入框大小，盖住多余背景 */
        .main .inpbox input {
            height: calc(100% - 4px);
            width: calc(100% - 6px);
            border-radius: 30px;
        }

        /* 按钮居中显示，设置边框 */
        .action {
            display: flex;
            justify-content: center;
        }

        .action .btn {
            width: 60%;
            text-transform: uppercase;
            border: 2px solid #0e92b3;
            text-align: center;
            line-height: 30px;
            cursor: pointer;
            transition: all 1s;
        }

        /* 聚焦时，调整背景定位 */
        .main .inpbox:has(input:focus) {
            animation:
                animate 5s linear infinite;
            transform: scale(1.2);
        }

        @keyframes animate {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 400% 0;
            }
        }

        /* 添加按钮悬停效果 */
        .action .btn:hover {
            transform: scale(1.2);
            background-color: #0e92b3;
        }

        img {
            width: 20px;
        }
    </style>
</head>

<body>
    <!-- 三部分，头部标题，主体表单，登录 -->
    <div class="form">
        <div class="header">初学者课堂</div>
        <div class="main">
            <div class="inpbox">
                <input type="text" placeholder="username" required>
            </div>
            <div class="inpbox">
                <input type="password" placeholder="password" id="pwd" required>
                <img src="./images/Hidden.png" alt="" id="img">
            </div>
        </div>
        <div class="action">
            <div class="btn"><a href="./content/project.html">login</a></div>
        </div>
    </div>
    <script>
        var pwd = document.getElementById('pwd');
        var img = document.getElementById('img');
        var btn = document.querySelector('.btn');
        var flag = 1;
        img.addEventListener('click', function () {
            if (flag == 1) {
                pwd.type = 'text';
                img.src = './images/Open.png';
                flag = 0;
            } else {
                pwd.type = 'password';
                img.src = './images/Hidden.png';
                flag = 1;
            }
        })
        // 此段代码用于服务器卡顿时
        // btn.addEventListener('click', function () {
        //     setTimeout(function () {
        //         alert('由于服务器请求超时，请耐心等待并重新进入', 2000);
        //     });
        // });
    </script>

</body>

</html>
